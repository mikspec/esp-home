esphome:
  name: carport
  friendly_name: carport
  on_boot:
    priority: -100
    then:
      # Keep light deterministic on restart while allowing plug state restore.
      - switch.turn_off: carport_light_relay
      - lambda: |-
          id(light_active_started_ms) = 0;

esp8266:
  board: nodemcuv2
  restore_from_flash: true

preferences:
  flash_write_interval: 1s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "Carport Fallback"
    password: !secret fallback_password

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  services:
    - service: carport_all_off
      then:
        - switch.turn_off: carport_plug_relay
        - switch.turn_off: carport_light_relay

ota:
  - platform: esphome
    password: !secret ota_password

# Web server for standalone access (optional)
web_server:
  port: 80

globals:
  - id: light_active_started_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

number:
  - platform: template
    id: carport_light_max_on_minutes
    name: "Carport Light Max On Minutes"
    optimistic: true
    restore_value: true
    initial_value: 30
    min_value: 1
    max_value: 480
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer-cog-outline
    entity_category: config

switch:
  - platform: template
    id: carport_light_watchdog_enabled
    name: "Carport Light Watchdog"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

  - platform: gpio
    id: carport_plug_relay
    name: "Carport Plug"
    pin:
      number: GPIO12
      inverted: false
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: carport_light_relay
    name: "Carport Light"
    pin:
      number: GPIO13
      inverted: false
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - lambda: |-
            id(light_active_started_ms) = millis();
    on_turn_off:
      then:
        - lambda: |-
            id(light_active_started_ms) = 0;

interval:
  - interval: 15s
    then:
      - lambda: |-
          if (!id(carport_light_watchdog_enabled).state) {
            return;
          }

          if (!id(carport_light_relay).state) {
            id(light_active_started_ms) = 0;
            return;
          }

          if (id(light_active_started_ms) == 0) {
            id(light_active_started_ms) = millis();
            return;
          }

          const float elapsed_minutes =
              (millis() - id(light_active_started_ms)) / 60000.0f;
          if (elapsed_minutes > id(carport_light_max_on_minutes).state) {
            id(carport_light_relay).turn_off();
            ESP_LOGW("carport", "Light watchdog timeout: forced OFF");
          }

sensor:
  - platform: wifi_signal
    name: "Carport WiFi Signal"
    update_interval: 60s
